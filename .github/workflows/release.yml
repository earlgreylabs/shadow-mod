name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, upload & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Install Devvit CLI
        run: pnpm add -g devvit

      - name: Configure Devvit credentials
        env:
          DEVVIT_TOKEN: ${{ secrets.DEVVIT_TOKEN }}
        run: |
          mkdir -p "$HOME/.devvit"
          echo "$DEVVIT_TOKEN" > "$HOME/.devvit/token"

      - name: Publish to Reddit Developer Platform
        run: devvit publish --public

      - name: Generate changelog from CHANGELOG.md
        id: changelog
        run: |
          node -e "
          const fs = require('fs');
          const tag = process.env.GITHUB_REF_NAME;
          const version = tag.startsWith('v') ? tag.slice(1) : tag;
          const content = fs.readFileSync('CHANGELOG.md', 'utf8');
          const regex = new RegExp('##\\\\\\s*\\\\[(' + version.replace(/\\./g, '\\\\.') + ')\\\\]');
          const match = content.match(regex);
          if (!match) {
            console.error('Could not find version header for [' + version + '] in CHANGELOG.md');
            process.exit(1);
          }
          const startIndex = match.index + match[0].length;
          const rest = content.slice(startIndex);
          const nextHeaderIndex = rest.search(/\\r?\\n##\\s*\\[/);
          const section = nextHeaderIndex !== -1 ? rest.slice(0, nextHeaderIndex) : rest;
          const cleanSection = section.trim().replace(/^.*?(\\r?\\n)/, '').trim().replace(/\\r?\\n---\\s*$/, '').trim();
          fs.writeFileSync('release_notes.txt', cleanSection);
          "

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
