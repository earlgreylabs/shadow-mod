pre-commit:
  parallel: true
  commands:
    types:
      glob: '*.{ts,tsx}'
      run: pnpm type-check
    lint:
      glob: '*.{ts,tsx}'
      run: pnpm exec eslint {staged_files}
    format:
      glob: '*.{ts,tsx,json,md}'
      run: pnpm exec prettier --check {staged_files}
    test:
      glob: 'src/**/*.{ts,tsx}'
      run: pnpm test

pre-push:
  commands:
    build:
      run: pnpm run build
